<svg xmlns="http://www.w3.org/2000/svg" width="800" height="380" viewBox="0 0 800 380" font-family="SFMono-Regular,Consolas,Menlo,monospace">
  <rect width="800" height="380" rx="10" fill="#11111b"/>
  <rect width="800" height="34" rx="10" fill="#313244"/><rect y="20" width="800" height="14" fill="#313244"/>
  <circle cx="20" cy="17" r="6" fill="#f38ba8"/><circle cx="40" cy="17" r="6" fill="#f9e2af"/><circle cx="60" cy="17" r="6" fill="#a6e3a1"/>
  <text x="400" y="22" fill="#bac2de" font-size="12" text-anchor="middle">promql-lint</text>
  <text font-size="12.5" xml:space="preserve">
    <tspan x="18" y="64" fill="#cdd6f4">sum(http_requests_total{instance=~".*"}) by (pod)</tspan>
  </text>
  <rect x="18" y="80" width="764" height="130" rx="8" fill="#181825"/>
  <text font-size="12.5" xml:space="preserve">
    <tspan x="34" y="106" fill="#f38ba8">  HIGH   counter-without-rate: 'http_requests_total' is a counter —</tspan>
    <tspan x="58" y="124" fill="#f38ba8">wrap it in rate()/increase().</tspan>
    <tspan x="34" y="148" fill="#f38ba8">  HIGH   high-cardinality-grouping: grouping by 'pod' explodes cardinality.</tspan>
    <tspan x="34" y="172" fill="#f9e2af">  MEDIUM match-all-regex: {instance=~".*"} matches everything — drop it.</tspan>
  </text>
  <text font-size="12.5" xml:space="preserve">
    <tspan x="18" y="244" fill="#6c7086"># will this melt the TSDB?</tspan>
    <tspan x="18" y="266" fill="#cdd6f4">estimateCardinality("sum(rate(x[5m])) by (job, pod)",</tspan>
    <tspan x="40" y="284" fill="#cdd6f4">{}, { job: 5, pod: 200 })</tspan>
  </text>
  <rect x="18" y="298" width="764" height="34" rx="8" fill="#2a1620"/>
  <text x="34" y="320" font-size="12.5" fill="#f38ba8">→ ~1,000 series   (5 jobs × 200 pods)  ⚠ high</text>
  <text x="18" y="360" font-size="12" fill="#a6e3a1">✓ 9 tests · counter/rate · match-all regex · high-card grouping · range-vector misuse</text>
</svg>
